services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: crm
    env_file:
      - pg_password.env
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    networks:
      - db

  datahub:
    build: .
    ports:
      - 5064:5000
    environment:
      DB_HOST: db
      DB_NAME: crm
      DB_USER: postgres
      UPLOAD_FOLDER: /app/uploads
      SECRET_KEY: ${SECRET_KEY:-datahub-super-secret-key-2026}
      URL_PREFIX: /datahub
    env_file:
      - pg_password.env
    volumes:
      - uploads:/app/uploads
    depends_on:
      - db
    networks:
      - db
      - nginx

volumes:
  pgdata:
  uploads:

networks:
  db:
  nginx:
    external: true
